services:
  # ─────────────────────────────────────────────────────────
  # Frontend - React + Vite (Static Site)
  # ─────────────────────────────────────────────────────────
  - type: web
    name: brainbazaar-frontend
    runtime: static
    repo: https://github.com/YOUR_USERNAME/BrainBazaar
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_EXPRESS_API_URL
        fromService:
          name: brainbazaar-server
          type: web
          property: host
          envVarKey: SERVER_HOST
      - key: VITE_FASTAPI_URL
        fromService:
          name: brainbazaar-fastapi
          type: web
          property: host
          envVarKey: FASTAPI_HOST
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─────────────────────────────────────────────────────────
  # Node.js Backend - Express + MongoDB
  # ─────────────────────────────────────────────────────────
  - type: web
    name: brainbazaar-server
    runtime: node
    repo: https://github.com/YOUR_USERNAME/BrainBazaar
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false  # You'll set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 30d
      - key: FRONTEND_URL
        fromService:
          name: brainbazaar-frontend
          type: web
          property: host
      - key: FASTAPI_URL
        fromService:
          name: brainbazaar-fastapi
          type: web
          property: host
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_ENCRYPTION_KEY
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # ─────────────────────────────────────────────────────────
  # FastAPI Backend - AI Services
  # ─────────────────────────────────────────────────────────
  - type: web
    name: brainbazaar-fastapi
    runtime: python
    repo: https://github.com/YOUR_USERNAME/BrainBazaar
    rootDir: brainbazar_fastapi-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: FRONTEND_URL
        fromService:
          name: brainbazaar-frontend
          type: web
          property: host
      - key: EXPRESS_API_URL
        fromService:
          name: brainbazaar-server
          type: web
          property: host
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
